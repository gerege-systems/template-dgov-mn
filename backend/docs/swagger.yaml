basePath: /api/v1
definitions:
  template_internal_http_datatransfers_requests.AIAudio:
    properties:
      data:
        maxLength: 716800
        type: string
      mime:
        enum:
        - audio/webm
        - audio/ogg
        - audio/wav
        - audio/mpeg
        - audio/mp3
        - audio/mp4
        - audio/m4a
        - audio/aac
        - audio/flac
        type: string
    required:
    - data
    - mime
    type: object
  template_internal_http_datatransfers_requests.AIChatRequest:
    properties:
      audio:
        $ref: '#/definitions/template_internal_http_datatransfers_requests.AIAudio'
      history:
        items:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.AIChatTurn'
        maxItems: 20
        type: array
      message:
        maxLength: 4000
        type: string
    type: object
  template_internal_http_datatransfers_requests.AIChatTurn:
    properties:
      role:
        enum:
        - user
        - model
        type: string
      text:
        maxLength: 4000
        type: string
    required:
    - role
    - text
    type: object
  template_internal_http_datatransfers_requests.AIPromptUpdateRequest:
    properties:
      content:
        maxLength: 4000
        type: string
    type: object
  template_internal_http_datatransfers_requests.AISTTRequest:
    properties:
      audio:
        $ref: '#/definitions/template_internal_http_datatransfers_requests.AIAudio'
    required:
    - audio
    type: object
  template_internal_http_datatransfers_requests.AITTSRequest:
    properties:
      text:
        maxLength: 2000
        type: string
      voice:
        maxLength: 40
        type: string
    required:
    - text
    type: object
  template_internal_http_datatransfers_requests.AITranslateRequest:
    properties:
      audio:
        $ref: '#/definitions/template_internal_http_datatransfers_requests.AIAudio'
      speak:
        type: boolean
      target_lang:
        maxLength: 20
        minLength: 2
        type: string
      text:
        maxLength: 4000
        type: string
    required:
    - target_lang
    type: object
  template_internal_http_datatransfers_requests.AddEIDSignerRequest:
    properties:
      role:
        maxLength: 100
        type: string
      signer_reg_no:
        maxLength: 20
        minLength: 8
        type: string
    required:
    - signer_reg_no
    type: object
  template_internal_http_datatransfers_requests.AddMemberRequest:
    properties:
      role:
        enum:
        - owner
        - admin
        - member
        type: string
      user_id:
        type: string
    required:
    - user_id
    type: object
  template_internal_http_datatransfers_requests.ApplicationRequest:
    properties:
      app_type:
        enum:
        - web
        - spa
        - native
        - m2m
        type: string
      enabled:
        type: boolean
      name:
        maxLength: 128
        minLength: 1
        type: string
      redirect_uris:
        items:
          type: string
        type: array
      service_ids:
        items:
          type: string
        type: array
      tags:
        items:
          type: string
        type: array
    required:
    - app_type
    - name
    type: object
  template_internal_http_datatransfers_requests.ApplicationServicesRequest:
    properties:
      service_ids:
        items:
          type: string
        type: array
    type: object
  template_internal_http_datatransfers_requests.AssetURLRequest:
    properties:
      url:
        maxLength: 1000
        type: string
    required:
    - url
    type: object
  template_internal_http_datatransfers_requests.ChangePasswordRequest:
    properties:
      current_password:
        maxLength: 72
        minLength: 1
        type: string
      new_password:
        maxLength: 72
        minLength: 12
        type: string
    required:
    - current_password
    - new_password
    type: object
  template_internal_http_datatransfers_requests.ConnectIntegrationRequest:
    properties:
      access_token:
        maxLength: 4096
        type: string
      expires_at_ms:
        description: ExpiresAtMs нь токены дуусах epoch миллисекунд (0 бол хугацаагүй).
        type: integer
      provider:
        maxLength: 32
        type: string
      refresh_token:
        maxLength: 4096
        type: string
    required:
    - access_token
    - provider
    type: object
  template_internal_http_datatransfers_requests.CreateOrgRequest:
    properties:
      name:
        maxLength: 200
        minLength: 2
        type: string
      name_latin:
        maxLength: 200
        type: string
      reg_no:
        maxLength: 40
        type: string
    required:
    - name
    - reg_no
    type: object
  template_internal_http_datatransfers_requests.EIDOrgRegisterRequest:
    properties:
      reg_no:
        maxLength: 16
        minLength: 4
        type: string
    required:
    - reg_no
    type: object
  template_internal_http_datatransfers_requests.EIDPollRequest:
    properties:
      google_link_token:
        description: |-
          GoogleLinkToken нь Google-ээр эхний удаа нэвтэрсэн хэрэглэгч eID-ээр
          баталгаажуулж байгаа үед л ирнэ (сонголттой).
        type: string
      session_id:
        type: string
    required:
    - session_id
    type: object
  template_internal_http_datatransfers_requests.EIDStartByNationalIDRequest:
    properties:
      callbackUrl:
        description: |-
          CallbackUrl (сонголт): SAME-DEVICE (утасны browser) үед <origin>/auth/eid/callback; хоосон
          бол CROSS-DEVICE (desktop). Backend force-normalize хийнэ.
        type: string
      national_id:
        type: string
    required:
    - national_id
    type: object
  template_internal_http_datatransfers_requests.ForgotPasswordRequest:
    properties:
      email:
        maxLength: 50
        type: string
    required:
    - email
    type: object
  template_internal_http_datatransfers_requests.GSpaceUploadRequest:
    properties:
      data:
        maxLength: 2900000
        type: string
      name:
        maxLength: 200
        type: string
    required:
    - data
    - name
    type: object
  template_internal_http_datatransfers_requests.GatewayServiceRequest:
    properties:
      connect_timeout_ms:
        maximum: 600000
        minimum: 100
        type: integer
      enabled:
        type: boolean
      host:
        maxLength: 255
        type: string
      name:
        maxLength: 80
        minLength: 2
        type: string
      path:
        maxLength: 255
        type: string
      port:
        maximum: 65535
        minimum: 1
        type: integer
      protocol:
        enum:
        - http
        - https
        type: string
      retries:
        maximum: 10
        minimum: 0
        type: integer
      tags:
        items:
          type: string
        type: array
    required:
    - host
    - name
    type: object
  template_internal_http_datatransfers_requests.GoogleLoginRequest:
    properties:
      code:
        type: string
      redirect_uri:
        type: string
    required:
    - code
    - redirect_uri
    type: object
  template_internal_http_datatransfers_requests.GovApplyRequest:
