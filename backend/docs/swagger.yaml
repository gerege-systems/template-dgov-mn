host: localhost:8080
info:
  contact:
    name: Government Template Platform V3.0
    url: https://github.com/snykk/go-rest-boilerplate
  description: chi (net/http) + pgx (PostgreSQL) + Redis дээр суурилсан Clean Architecture
    бүхий Go backend. Нээлттэй эхийн snykk/go-rest-boilerplate (MIT, зохиогч Najib
    Fikri)-ээс үүсэлтэй; HTTP давхаргыг chi, өгөгдлийн давхаргыг pgx руу хөрвүүлсэн.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/snykk/go-rest-boilerplate
  title: Government Template Platform V3.0 API
  version: "1.0"
paths:
  /admin/ai/prompts:
    get:
      description: Тохируулдаг prompt давхаргуудыг (scope — хамрах хүрээ, instructions
        — нэмэлт заавар) буцаана. Suurь (base) дүрэм кодод хатуу бичигдсэн тул энд
        харагдахгүй, өөрчлөгдөхгүй.
      produces:
      - application/json
      responses:
        "200":
          description: Prompt layers
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/template_internal_http_datatransfers_responses.AIPromptResponse'
                  type: array
              type: object
        "401":
          description: Missing/invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Missing settings.manage permission
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: AI prompt давхаргуудыг жагсаах
      tags:
      - admin
  /admin/ai/prompts/{key}:
    put:
      consumes:
      - application/json
      description: Нэг давхаргын (scope | instructions) агуулгыг солино. Өөрчлөлт
        нэн даруй үйлчилнэ (prompt кэш хүчингүй болдог). AI зөвхөн scope-д заасан
        хүрээнд ажиллана.
      parameters:
      - description: Prompt key (scope | instructions)
        in: path
        name: key
        required: true
        type: string
      - description: New content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.AIPromptUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Unknown key / malformed body
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Missing/invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Missing settings.manage permission
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: AI prompt давхаргыг шинэчлэх
      tags:
      - admin
  /ai/chat:
    post:
      consumes:
      - application/json
      description: Хэрэглэгчийн мессежийг (текст эсвэл audio — дуут мессежийг AI шууд
        ойлгоно) Gemini AI pipeline-аар боловсруулж Монгол хариулт буцаана. AI шаардлагатай
        үед backend tool-уудыг (function calling) ашигладаг; гүйцэтгэсэн алхмууд steps
        талбарт ил гарна. AI үйлчилгээ түр унавал degraded=true + fallback мессеж
        буцаана (5xx биш).
      parameters:
      - description: Chat message (text and/or audio) + optional history
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.AIChatRequest'
      produces:
      - application/json
      responses:
        "200":
          description: AI reply
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.AIChatResponse'
              type: object
        "400":
          description: Malformed JSON body / missing message and audio
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Missing/invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: AI туслахтай чатлах (текст/дуут мессеж)
      tags:
      - ai
  /ai/stt:
    post:
      consumes:
      - application/json
      description: Base64 кодлогдсон audio (webm/ogg/wav/mp3 г.м.)-г Gemini-ээр текст
        болгоно. Яриа илрээгүй бол хоосон text буцаана.
      parameters:
      - description: Audio (base64)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.AISTTRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Transcript
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.AISTTResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Missing/invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Яриаг текст болгох (STT)
      tags:
      - ai
  /ai/translate:
    post:
      consumes:
      - application/json
      description: Текст эсвэл audio-г зорилтот хэл рүү орчуулна. Audio өгвөл эхлээд
        STT хийгээд орчуулдаг; speak=true бол орчуулгын дуут (TTS) хувилбарыг хамт
        буцаана. Live орчуулга = богино audio chunk-уудыг энэ endpoint руу дараалан
        илгээх урсгал. Чимээгүй chunk-д хоосон үр дүн буцаана.
      parameters:
      - description: Text or audio + target_lang
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.AITranslateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Translation
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.AITranslateResponse'
              type: object
        "400":
          description: Malformed JSON body / missing text and audio
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Missing/invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Шууд (live) орчуулга
      tags:
      - ai
  /ai/tts:
    post:
      consumes:
      - application/json
      description: 'Текстийг Gemini TTS model-ээр дуут (audio/wav, base64) болгоно.
        voice нь сонголттой prebuilt дуу хоолой (өгөгдмөл: Kore).'
      parameters:
      - description: Text + optional voice
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.AITTSRequest'
      produces:
      - application/json
      responses:
        "200":
          description: WAV audio (base64)
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.AIAudioOut'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Missing/invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Текстийг яриа болгох (TTS)
      tags:
      - ai
  /applications:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Application-уудыг жагсаах
      tags:
      - applications
    post:
      consumes:
      - application/json
      parameters:
      - description: Application
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.ApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Application (OAuth2 client) үүсгэх
      tags:
      - applications
  /applications/{id}:
    delete:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Application устгах (Hydra client + overlay)
      tags:
      - applications
    get:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Application-ыг id-гээр авах
      tags:
      - applications
    put:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Application
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.ApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Application шинэчлэх
      tags:
      - applications
  /applications/{id}/rotate-secret:
    post:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Application-ын client secret эргүүлэх
      tags:
      - applications
  /applications/{id}/services:
    put:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Service IDs
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.ApplicationServicesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Application-д зөвшөөрсөн gateway service-үүдийг оноох
      tags:
      - applications
  /auth/eid/poll:
    post:
      consumes:
      - application/json
      description: session_id-ийн төлвийг IdP-ээс long-poll-оор (≤25с) асууна. state
        нь RUNNING/COMPLETE/EXPIRED/REFUSED. COMPLETE үед identity-аар хэрэглэгчийг
        бүртгэж/шинэчилж, access+refresh токен хосыг /login-той ижил хэлбэрээр буцаана.
      parameters:
      - description: eID session id
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.EIDPollRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Session state (with tokens if COMPLETE)
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.EIDPollResponse'
              type: object
        "400":
          description: Malformed JSON body or missing session_id
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "500":
          description: Failed to reach eID provider
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: eID session-ийн төлвийг асуух (long-poll)
      tags:
      - auth
  /auth/eid/start:
    post:
      consumes:
      - application/json
      description: Гадаад eID identity provider дээр QR/deep-link нэвтрэлтийг эхлүүлж,
        клиент харуулах session мэдээллийг (session_id, device_link_url, verification_code,
        expires_at) буцаана. Дараа нь /auth/eid/poll руу session_id-г дамжуулж төлвийг
        асууна.
      produces:
      - application/json
      responses:
        "200":
          description: eID session started
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.EIDStartResponse'
              type: object
        "500":
          description: Failed to reach eID provider
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: eID нэвтрэлт эхлүүлэх (QR / deep-link)
      tags:
      - auth
  /auth/eid/start-id:
    post:
      consumes:
      - application/json
      description: Иргэний РД (national_id)-аар нэвтрэлтийг эхлүүлж, тухайн РД-тэй
        холбоотой бүртгэлтэй төхөөрөмж рүү баталгаажуулах prompt push хийлгэнэ. QR/device_link
        шаардлагагүй тул зөвхөн session_id, verification_code, expires_at буцна. Дараа
        нь /auth/eid/poll руу session_id-г дамжуулж төлвийг асууна.
      parameters:
      - description: Иргэний РД
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.EIDStartByNationalIDRequest'
      produces:
      - application/json
      responses:
        "200":
          description: eID session started
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.EIDStartResponse'
              type: object
        "400":
          description: Malformed JSON body or missing national_id
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "500":
          description: Failed to reach eID provider
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: eID нэвтрэлт эхлүүлэх (РД-аар push)
      tags:
      - auth
  /auth/google:
    post:
      consumes:
      - application/json
      description: Google OAuth callback-ийн code-ийг боловсруулна. Холбогдсон account
        бол шууд токен олгоно; эхний удаа бол eID-ээр баталгаажуулах link_token буцаана.
      parameters:
      - description: OAuth code + redirect_uri
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.GoogleLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Linked → tokens, эсвэл эхний удаа → link_token
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.GoogleLoginResponse'
              type: object
        "400":
          description: Invalid code
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Google-ээр нэвтрэх (eID холболттой)
      tags:
      - auth
  /auth/google/link:
    delete:
      description: Нэвтэрсэн хэрэглэгчийн Google холболтыг (sub + профайл) арилгана.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Google холболтыг салгах
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Access токен (богино TTL) болон refresh токен (урт TTL) буцаана.
        Хэрэглэгчийг тоолохоос сэргийлэхийн тулд буруу нууц үг болон тодорхойгүй email
        ижил хугацаа зарцуулна.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tokens issued
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.UserResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Account not yet activated
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Баталгаажуулж токен хос олгох
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: /auth/refresh татгалзахын тулд refresh-токены jti-г Redis-ээс устгана.
        access_token өгөгдсөн бол түүний jti-г deny-list-д нэмж access токеныг ч мөн
        шууд хүчингүй болгоно (өгөөгүй бол байгалийн хугацаа дуустлаа хүчинтэй үлдэнэ).
      parameters:
      - description: Refresh token to revoke + optional access token to deny
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Refresh token invalid
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Токенуудыг хүчингүй болгох
      tags:
      - auth
  /auth/password/change:
    put:
      consumes:
      - application/json
      description: Одоогийн нууц үгийг шалгаж, шинээр сольж, цуцлалтын хязгаарыг тэмдэглэдэг
        тул одооноос өмнө олгогдсон refresh токенууд татгалзагдана.
      parameters:
      - description: Current + new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Current password incorrect
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Баталгаажуулагдсан хэрэглэгчийн нууц үгийг солих
      tags:
      - auth
  /auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Хаяг руу нэг удаагийн OTP кодыг (GeregeCloud Verify) и-мэйлээр
        илгээнэ. Хэрэглэгчийг тоолохоос сэргийлэхийн тулд email бүртгэлгүй байсан
        ч үргэлж 200 буцаана.
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset email queued (or email not registered — same response
            either way)
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Нууц үг сэргээх OTP код илгээх
      tags:
      - auth
  /auth/password/reset:
    post:
      consumes:
      - application/json
      description: ForgotPassword-ийн email-ээр илгээсэн OTP кодыг GeregeCloud Verify-ээр
        баталгаажуулж, шинэ нууц үг тогтоож, токены цуцлалтын хязгаарыг урагшлуулна.
      parameters:
      - description: Email + OTP code + new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Reset code invalid or expired
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: OTP кодоор шинэ нууц үг тогтоох
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Өгөгдсөн refresh токеныг шалгаж, шинэ access+refresh хос үүсгэж,
        хуучин jti-г Redis-д хүчингүй болгоно. Аль хэдийн сэлгэгдсэн токеныг дахин
        тоглуулах нь 401 буцаана.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New token pair
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.UserResponse'
              type: object
        "401":
          description: Refresh token invalid, expired, or already revoked
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Account no longer active
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Refresh токеныг сэлгэж, шинэ хос буцаах
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Хэрэглэгчийн бүртгэлийг идэвхгүй төлөвт үүсгэнэ. Дуудагч нь /auth/login
        амжилттай болохоос өмнө бүртгэлийг идэвхжүүлэхийн тулд /auth/send-otp + /auth/verify-otp-г
        дагах ёстой.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.UserResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "409":
          description: Email or username already in use
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error (per-field detail in data.errors)
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Шинэ хэрэглэгч бүртгэх
      tags:
      - auth
  /auth/send-otp:
    post:
      consumes:
      - application/json
      description: GeregeCloud Verify API-аар OTP илгээж, буцаасан request_id-г TTL-тэйгээр
        Redis-д хадгална. Кодын үүсгэлт/хадгалалт/илгээлтийг Verify үйлчилгээ хариуцна.
      parameters:
      - description: Email to send OTP to
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.SendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP enqueued
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Account already activated
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Email not registered
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "500":
          description: Failed to enqueue mail
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Хэрэглэгчийн email рүү OTP код илгээх
      tags:
      - auth
  /auth/verify-otp:
    post:
      consumes:
      - application/json
      description: Өгөгдсөн кодыг Redis-тэй тулгаж шалгаж, амжилттай үед хэрэглэгчийн
        active flag-г true болгоно. Brute-force-оос хамгаалагдсан — OTP_MAX_ATTEMPTS
        алдаа (өгөгдмөл 5) гарсны дараа зөв кодтой ч email нь OTP TTL цонхны турш
        түгжигдэнэ.
      parameters:
      - description: Email + OTP code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Account activated
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Invalid OTP code
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Locked out — too many invalid attempts
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Email not registered
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: OTP кодыг шалгаж бүртгэлийг идэвхжүүлэх
      tags:
      - auth
  /core/organizations:
    get:
      description: core.dgov.mn /api/organization/find — search_text (регистр г.м.).
        Хариуг дамжуулна.
      parameters:
      - description: regno / нэр
        in: query
        name: search_text
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Gerege Core байгууллага хайх
      tags:
      - core
  /core/users:
    get:
      description: core.dgov.mn /api/user/find — search_text (core_id эсвэл регистр).
        Хариуг дамжуулна.
      parameters:
      - description: core_id / regno
        in: query
        name: search_text
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Gerege Core хэрэглэгч хайх
      tags:
      - core
  /gateway/logs:
    get:
      parameters:
      - description: Max rows (default 100, max 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Gateway-ийн сүүлийн хүсэлтийн log
      tags:
      - gateway
  /gateway/overview:
    get:
      description: Сүүлийн 24 цагийн хүсэлт/алдааны хувь/латентаас бүрдсэн dashboard
        нэгтгэл.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: API Gateway-ийн нэгтгэсэн статистик
      tags:
      - gateway
  /gateway/services:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Upstream service-үүдийг жагсаах
      tags:
      - gateway
    post:
      consumes:
      - application/json
      parameters:
      - description: Service
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.GatewayServiceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Upstream service үүсгэх
      tags:
      - gateway
  /gateway/services/{id}:
    delete:
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Upstream service устгах
      tags:
      - gateway
    put:
      consumes:
      - application/json
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      - description: Service
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.GatewayServiceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Upstream service шинэчлэх
      tags:
      - gateway
  /gov/applications:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Миний хүсэлтүүд
      tags:
      - gov
    post:
      consumes:
      - application/json
      parameters:
      - description: Apply
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.GovApplyRequest'
      produces:
