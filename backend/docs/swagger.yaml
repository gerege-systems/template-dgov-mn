  /v1/audit:
    get:
      description: Hash-chained, append-only audit log-ийг хуудаслан буцаана. action
        / actor query параметрээр шүүж болно. Зөвхөн admin.
      parameters:
      - description: action-аар шүүх
        in: query
        name: action
        type: string
      - description: actor_user_id-аар шүүх (uuid)
        in: query
        name: actor
        type: string
      - description: хуудасны хэмжээ (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: эхлэх байрлал (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Audit entries
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/template_internal_http_datatransfers_responses.AuditLogResponse'
                  type: array
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Not an admin
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Audit log жагсаах (admin)
      tags:
      - audit
