      note:
        maxLength: 500
        type: string
      service_id:
        type: string
    required:
    - service_id
    type: object
  template_internal_http_datatransfers_requests.GovBookRequest:
    properties:
      location:
        maxLength: 200
        type: string
      note:
        maxLength: 500
        type: string
      scheduled_at:
        type: string
      service_id:
        type: string
    required:
    - scheduled_at
    type: object
  template_internal_http_datatransfers_requests.GovReferenceRequest:
    properties:
      type:
