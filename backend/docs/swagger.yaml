        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Not a super admin / cannot revoke self or super admin
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Админ эрхийг хасах
      tags:
      - superadmin
  /v1/superadmin/admins/{id}/grant:
    put:
      description: Байгаа хэрэглэгчийг admin болгоно. Зөвхөн super admin хандана.
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Admin granted
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "409":
          description: Already an admin
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Хэрэглэгчид админ эрх олгох
      tags:
      - superadmin
  /v1/superadmin/admins/by-register:
    get:
      description: Регистрийн дугаараар DAN-д БАЙГАА хэрэглэгчийг олж буцаана (эрх
        олгохгүй, зөвхөн нэр/эрхийг урьдчилан харах). Зөвхөн super admin.
      parameters:
      - description: Регистрийн дугаар
        in: query
        name: register
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User found
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Register not registered in DAN
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Регистрээр хэрэглэгч харах (preview)
      tags:
      - superadmin
    post:
      consumes:
      - application/json
      description: Регистрийн дугаараар БАЙГАА хэрэглэгчийг admin болгоно (шинэ хэрэглэгч
        үүсгэхгүй). Зөвхөн super admin хандана.
      parameters:
      - description: Register
        in: body
        name: payload
        required: true
        schema:
