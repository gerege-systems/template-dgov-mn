      - audit
  /v1/auth/superadmin/mfa:
    post:
      consumes:
      - application/json
      description: Google эсвэл eID нэвтрэлтээс авсан mfa_token-ийг TOTP код ЭСВЭЛ
        нөөц кодоор баталгаажуулж session олгоно. Нөөц код нэг удаагийн (хэрэглэгдмэгц
        идэвхгүй болно). Хэт олон буруу оролдлого → токен цуцлагдана.
      parameters:
      - description: mfa_token + TOTP эсвэл нөөц код
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.SuperadminMFARequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged in
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.SuperadminMFAResponse'
              type: object
        "400":
          description: Invalid code
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: MFA token invalid/expired or too many attempts
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Super admin нэвтрэлт — 2FA (TOTP / нөөц код)
      tags:
      - superadmin-onboard
  /v1/auth/superadmin/onboard/eid/poll:
    post:
      consumes:
      - application/json
      description: 'eID session-ийн төлвийг long-poll-оор (≤25с) асууна: RUNNING/COMPLETE/EXPIRED/REFUSED.
        COMPLETE үед identity нь шидтэнд БАРИГДАЖ, алхам "email" болно. АНХААР: энэ
        алхамд токен ОЛГОГДОХГҮЙ.'
      parameters:
      - description: Onboard token + eID session id
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.SuperadminOnboardEIDPollRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Session state
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.SuperadminOnboardEIDPollResponse'
              type: object
        "400":
          description: Invalid body or wrong step
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Onboard session invalid or expired
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Super admin бүртгэл — eID төлөв асуух (long-poll)
      tags:
      - superadmin-onboard
  /v1/auth/superadmin/onboard/eid/start:
    post:
      consumes:
      - application/json
      description: Бүртгэлийн eID баталгаажуулах алхмыг QR/deep-link-ээр эхлүүлнэ.
        callbackUrl хоосон бол CROSS-DEVICE (desktop QR); хоосон биш бол SAME-DEVICE
        (mobile browser).
      parameters:
      - description: Onboard token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.SuperadminOnboardEIDStartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: eID session started
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.SuperadminOnboardEIDStartResponse'
              type: object
        "400":
          description: Invalid body or wrong step
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Onboard session invalid or expired
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Super admin бүртгэл — eID эхлүүлэх (QR / deep-link)
      tags:
      - superadmin-onboard
  /v1/auth/superadmin/onboard/eid/start-id:
    post:
      consumes:
      - application/json
      description: Бүртгэлийн eID алхмыг иргэний РД-аар эхлүүлж, бүртгэлтэй төхөөрөмж
