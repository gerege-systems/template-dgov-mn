        - residence
        - birth
        - marriage
        - tax
        - social_ins
        - criminal
        type: string
    required:
    - type
    type: object
  template_internal_http_datatransfers_requests.IngestSecurityEventRequest:
    properties:
      detail:
        additionalProperties: {}
        type: object
      kind:
        maxLength: 80
        type: string
      severity:
        enum:
        - low
        - medium
        - high
        - critical
        type: string
      source:
        maxLength: 80
        type: string
    required:
    - kind
    type: object
  template_internal_http_datatransfers_requests.LatinNameRequest:
    properties:
      first_name_en:
        maxLength: 120
        type: string
      last_name_en:
        maxLength: 120
        type: string
    type: object
  template_internal_http_datatransfers_requests.LoginRequest:
    properties:
      email:
        maxLength: 50
        type: string
      password:
        maxLength: 72
        minLength: 1
        type: string
    required:
    - email
    - password
    type: object
  template_internal_http_datatransfers_requests.LogoutRequest:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  template_internal_http_datatransfers_requests.OrgNameLatinRequest:
    properties:
      name_latin:
        maxLength: 200
        type: string
    type: object
  template_internal_http_datatransfers_requests.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  template_internal_http_datatransfers_requests.RegisterRequest:
    properties:
      email:
        maxLength: 50
        type: string
      first_name:
        description: нэр (монгол)
        maxLength: 50
        minLength: 1
        type: string
      first_name_en:
        description: нэр (англи)
        maxLength: 50
        type: string
      last_name:
        description: овог (монгол)
        maxLength: 50
        minLength: 1
        type: string
      last_name_en:
        description: овог (англи)
        maxLength: 50
        type: string
      password:
        maxLength: 72
        minLength: 12
        type: string
      username:
        maxLength: 25
        minLength: 3
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - username
    type: object
  template_internal_http_datatransfers_requests.ResetPasswordRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 50
        type: string
      new_password:
