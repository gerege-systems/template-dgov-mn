      active:
        type: boolean
      deactivated_at:
        type: string
      document_number:
        type: string
      enrolled_at:
        type: string
      platform:
        type: string
    type: object
  template_internal_http_datatransfers_responses.EIDPollResponse:
    properties:
      created_at:
        type: string
      eid:
        allOf:
        - $ref: '#/definitions/template_internal_http_datatransfers_responses.EIDInfo'
        description: |-
          EID нь eID-ээр нэвтэрсэн хэрэглэгчийн identity + сертификатын мэдээлэл.
          Нууц үгээр бүртгүүлсэн хэрэглэгчид nil (omitempty).
      eid_proxy:
        description: |-
          EIDProxy нь SSO eID proxy идэвхтэй эсэхийг заана — идэвхтэй бол иргэн
          локал eID linkage-гүй (SSO-ээр нэвтэрсэн) байсан ч eID PKI самбарыг SSO-
          гоор дамжуулан үзэж болно. Frontend eID хуудсуудыг үүгээр нээнэ.
        type: boolean
      email:
        type: string
      first_name:
        type: string
      first_name_en:
        type: string
      full_name:
        type: string
      full_name_en:
        type: string
      google:
        allOf:
        - $ref: '#/definitions/template_internal_http_datatransfers_responses.GoogleInfo'
        description: |-
          Google нь холбогдсон Google account-аас хадгалсан профайл. Google
          холбоогүй хэрэглэгчид nil (omitempty).
      id:
        type: string
      last_name:
        type: string
      last_name_en:
        type: string
      mfa_required:
        type: boolean
      mfa_token:
        type: string
      refresh_token:
        type: string
      role_id:
        type: integer
      state:
        type: string
      token:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  template_internal_http_datatransfers_responses.EIDStartResponse:
