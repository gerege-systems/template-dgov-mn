    post:
      consumes:
      - application/json
      description: Google OAuth code-ийг солиж, и-мэйлийг super admin урилгын allow-list-ийн
        эсрэг шалгана. Урилгагүй / аль хэдийн ашигласан урилга бол 403. Амжилттай
        бол шидтэний onboard_token үүсгэж, дараагийн алхмыг (eid) буцаана.
      parameters:
      - description: OAuth code + redirect_uri
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.SuperadminOnboardGoogleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Onboarding started
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.SuperadminOnboardStartResponse'
              type: object
        "400":
          description: Invalid code
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Email is not invited or invite already used
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      summary: Super admin бүртгэл — Google алхам
      tags:
      - superadmin-onboard
  /v1/auth/superadmin/onboard/totp/init:
    post:
      consumes:
      - application/json
      description: Шинэ TOTP secret үүсгэж, authenticator app-д уншуулах otpauth://
