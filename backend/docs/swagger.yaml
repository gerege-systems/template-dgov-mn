          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Register not registered in DAN
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "409":
          description: Already an admin
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Регистрээр админ нэмэх
      tags:
      - superadmin
  /v1/superadmin/invites:
    get:
      description: Super admin болох урилгуудыг (хүлээгдэж буй + ашигласан) буцаана.
        Зөвхөн super admin хандана.
      produces:
      - application/json
      responses:
        "200":
          description: Invites fetched
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/template_internal_http_datatransfers_responses.SuperadminInviteResponse'
                  type: array
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Super admin урилгуудыг жагсаах
      tags:
      - superadmin
    post:
      consumes:
      - application/json
      description: И-мэйлийг super admin болох allow-list-д нэмнэ. Урилга нь эрхийг
        ШУУД олгодоггүй — урьсан хүн /auth/superadmin/onboard шидтэнг (Google + eID
        + и-мэйл OTP + TOTP) бүрэн давж байж super admin болно. Зөвхөн super admin
        хандана.
      parameters:
      - description: Invite email
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/template_internal_http_datatransfers_requests.SuperadminInviteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Invite created
          schema:
            allOf:
            - $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/template_internal_http_datatransfers_responses.SuperadminInviteResponse'
              type: object
        "400":
          description: Invalid email
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "409":
          description: Email already invited
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Super admin урих
      tags:
      - superadmin
  /v1/superadmin/invites/{email}:
    delete:
      description: Урилгыг allow-list-ээс хасна — хараахан бүртгүүлээгүй бол цаашид
        бүртгүүлэх боломжгүй болно. Зөвхөн super admin хандана.
      parameters:
      - description: Invited email (URL-encoded)
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Invite deleted
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Not a super admin
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Invite not found
          schema:
            $ref: '#/definitions/template_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Super admin урилгыг цуцлах
      tags:
      - superadmin
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: /auth/login эсвэл /auth/refresh-аас олгогдсон Bearer хандах токен
      (access token).
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
